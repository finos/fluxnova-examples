# Updates project and dependency versions, creates a release branch, and opens a PR.
# Supports both manual trigger and repository_dispatch (API) with version input.

name: Update Version and Create PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true
        type: string

  repository_dispatch:
    types: [update-version]

jobs:
  update-version:
    runs-on: ubuntu-latest

    steps:
      - name: Determine version input
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.event.client_payload.version }}"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update pom.xml versions
        run: |
          VERSION=${{ env.VERSION }}

          echo "Updating versions to $VERSION"
          mvn -f fluxnova-springboot-example/pom.xml versions:set \
           -DnewVersion=$VERSION \
           -DprocessAllModules=true \
           -DgenerateBackupPoms=false

          mvn -f fluxnova-springboot-example/pom.xml versions:set-property \
            -Dproperty=fluxnova.version \
            -DnewVersion=$VERSION \
            -DgenerateBackupPoms=false

      - name: Verify changes
        run: |
          echo "===== git diff ====="
          git diff

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/${{ env.VERSION }}
          title: "Release ${{ env.VERSION }}"
          base: main
          commit-message: "Update version to ${{ env.VERSION }}"
          body: |
            This PR updates:
            - project version → ${{ env.VERSION }}
            - fluxnova.version → ${{ env.VERSION }}