name: "Build and Publish Docker Image"
description: "Build and publish a Docker image to Docker Hub"

inputs:
  image_name:
    description: "Docker Hub image name"
    required: true
  dockerfile_path:
    description: "Path to Dockerfile"
    required: true
    default: "fluxnova-springboot-example/Dockerfile"
  docker_context:
    description: "Docker build context"
    required: false
    default: "."
  release_tag:
    description: "Release tag version"
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      shell: bash

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ env.DOCKER_PASSWORD }}

    - name: Set Docker Image Tag
      id: tags
      shell: bash
      run: |
        echo "tags=${{ inputs.image_name }}:${{ inputs.release_tag }},${{ inputs.image_name }}:latest" >> $GITHUB_OUTPUT

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.docker_context }}
        file: ${{ inputs.dockerfile_path }}
        push: true
        tags: ${{ steps.tags.outputs.tags }}
        provenance: true
